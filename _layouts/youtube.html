{% include header.html %}

<h1 class="post-title">{{ page.title }}</h1>

{{ content }}

<style>
    #yt-tool {
        margin: 1.5em 0;
    }

    #yt-tool label {
        display: block;
        margin-bottom: 0.4em;
        font-weight: bold;
    }

    .yt-input-row {
        display: flex;
        gap: 0.5em;
        flex-wrap: wrap;
    }

    #channel-input {
        flex: 1 1 auto;
        min-width: 0;
        padding: 0.5em 0.6em;
        font-size: 1em;
        font-family: inherit;
        border: 1px solid #aaa;
        border-radius: 4px;
        background: #fff;
        color: #04100d;
    }

    #find-btn {
        padding: 0.5em 1.1em;
        font-size: 1em;
        font-family: inherit;
        background: #005ca3;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        white-space: nowrap;
    }

    #find-btn:hover {
        background: #004a85;
    }

    #find-btn:disabled {
        opacity: 0.6;
        cursor: default;
    }

    #yt-result {
        margin-top: 1.2em;
        padding: 0.9em 1em;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
    }

    #yt-result .result-label {
        margin: 0 0 0.4em 0;
        font-size: 0.85em;
        color: #555;
    }

    .result-row {
        display: flex;
        align-items: center;
        gap: 0.5em;
        flex-wrap: wrap;
    }

    #rss-link {
        flex: 1 1 auto;
        word-break: break-all;
        color: #295147;
        font-family: ui-monospace, monospace, "Courier New";
        font-size: 0.9em;
    }

    #copy-btn {
        padding: 0.3em 0.8em;
        font-size: 0.9em;
        font-family: inherit;
        background: #cec452;
        color: #04100d;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
    }

    #copy-btn:hover {
        background: #b5ad3e;
    }

    #yt-error {
        margin-top: 1em;
        padding: 0.7em 0.9em;
        border-left: 3px solid #c0392b;
        background: #fdf0ef;
        color: #c0392b;
        border-radius: 0 4px 4px 0;
        font-size: 0.9em;
    }

    #yt-status {
        margin-top: 0.8em;
        font-size: 0.9em;
        color: #555;
    }

    .xml-section {
        margin-top: 1em;
    }

    .xml-section summary {
        cursor: pointer;
        font-size: 0.85em;
        color: #555;
        padding: 0.3em 0;
        user-select: none;
    }

    .xml-section summary:hover {
        color: #005ca3;
    }

    .xml-block {
        margin: 0.4em 0 0 0;
        padding: 0.7em 0.9em;
        background: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: ui-monospace, monospace, "Courier New";
        font-size: 0.78em;
        line-height: 1.5;
        white-space: pre;
        overflow-x: auto;
        color: #04100d;
    }

    @media (max-width: 480px) {

        #find-btn,
        #copy-btn {
            width: 100%;
        }

        #find-btn {
            margin-top: 0.2em;
        }
    }
</style>

<div id="yt-tool">
    <label for="channel-input">YouTube channel URL or @handle</label>
    <div class="yt-input-row">
        <input type="text" id="channel-input" placeholder="e.g. @mkbhd or https://youtube.com/@mkbhd" autocomplete="off"
            autocorrect="off" autocapitalize="off" spellcheck="false">
        <button id="find-btn">Find RSS</button>
    </div>
    <div id="yt-status" hidden></div>
    <div id="yt-error" hidden></div>
    <div id="yt-result" hidden>
        <p class="result-label">RSS feed URL:</p>
        <div class="result-row">
            <a id="rss-link" href="" target="_blank" rel="noopener noreferrer"></a>
            <button id="copy-btn">Copy</button>
        </div>
        <details class="xml-section" id="xml-raw-section" hidden>
            <summary>Raw XML (feed header)</summary>
            <pre class="xml-block" id="xml-raw"></pre>
        </details>
        <details class="xml-section" id="xml-entry-section" hidden>
            <summary>Latest entry</summary>
            <pre class="xml-block" id="xml-entry"></pre>
        </details>
    </div>
</div>

<script>
    (function () {
        const input = document.getElementById('channel-input');
        const findBtn = document.getElementById('find-btn');
        const statusEl = document.getElementById('yt-status');
        const errorEl = document.getElementById('yt-error');
        const resultEl = document.getElementById('yt-result');
        const rssLink = document.getElementById('rss-link');
        const copyBtn = document.getElementById('copy-btn');
        const xmlRawSection = document.getElementById('xml-raw-section');
        const xmlEntrySection = document.getElementById('xml-entry-section');
        const xmlRawEl = document.getElementById('xml-raw');
        const xmlEntryEl = document.getElementById('xml-entry');

        function setStatus(msg) {
            statusEl.textContent = msg;
            statusEl.hidden = !msg;
        }
        function setError(msg) {
            errorEl.textContent = msg;
            errorEl.hidden = !msg;
            resultEl.hidden = true;
        }
        function showResult(url) {
            rssLink.href = url;
            rssLink.textContent = url;
            resultEl.hidden = false;
            copyBtn.textContent = 'Copy';
            xmlRawSection.hidden = true;
            xmlEntrySection.hidden = true;
            xmlRawEl.textContent = '';
            xmlEntryEl.textContent = '';
            fetchAndShowXml(url);
        }
        function reset() {
            setStatus('');
            setError('');
            resultEl.hidden = true;
            xmlRawSection.hidden = true;
            xmlEntrySection.hidden = true;
        }

        async function fetchAndShowXml(feedUrl) {
            try {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(feedUrl);
                const res = await fetch(proxyUrl);
                if (!res.ok) return;
                const raw = await res.text();

                // Show feed header: everything up to (but not including) the first <entry>
                const entryStart = raw.indexOf('<entry>');
                const header = entryStart !== -1 ? raw.slice(0, entryStart).trimEnd() : raw;
                xmlRawEl.textContent = header;
                xmlRawSection.hidden = false;

                // Extract the first <entry>…</entry>
                if (entryStart !== -1) {
                    const entryEnd = raw.indexOf('</entry>', entryStart);
                    if (entryEnd !== -1) {
                        xmlEntryEl.textContent = raw.slice(entryStart, entryEnd + '</entry>'.length);
                        xmlEntrySection.hidden = false;
                    }
                }
            } catch (_) {
                // Non-fatal — feed preview is optional
            }
        }

        // Parse the raw input; returns { channelId } or { fetchUrl } or null
        function parseInput(raw) {
            const val = raw.trim();
            if (!val) return null;

            // Already looks like an RSS feed URL
            const rssMatch = val.match(/[?&]channel_id=(UC[\w-]+)/);
            if (rssMatch) return { channelId: rssMatch[1] };

            // Try parsing as a URL (with or without protocol)
            let urlObj = null;
            try {
                urlObj = new URL(val.startsWith('http') ? val : 'https://' + val);
            } catch (_) { }

            if (urlObj && (urlObj.hostname === 'www.youtube.com' || urlObj.hostname === 'youtube.com')) {
                // /channel/UCxxxxxx — we have the ID directly
                const chanMatch = urlObj.pathname.match(/^\/channel\/(UC[\w-]+)/);
                if (chanMatch) return { channelId: chanMatch[1] };

                // /@handle, /c/name, /user/name — need to resolve
                if (/^\/@|^\/c\/|^\/user\//.test(urlObj.pathname)) {
                    return { fetchUrl: 'https://www.youtube.com' + urlObj.pathname };
                }
            }

            // @handle (with or without the @)
            const handleMatch = val.match(/^@?([\w.-]{1,100})$/);
            if (handleMatch) {
                return { fetchUrl: 'https://www.youtube.com/@' + handleMatch[1] };
            }

            return null;
        }

        async function resolveToChannelId(fetchUrl) {
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(fetchUrl);
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error('Could not reach YouTube (' + res.status + ')');
            const html = await res.text();

            // Channel ID appears in several places in the page source
            const patterns = [
                /"channelId":"(UC[\w-]+)"/,
                /"externalId":"(UC[\w-]+)"/,
                /[?&]channel_id=(UC[\w-]+)/,
            ];
            for (const re of patterns) {
                const m = html.match(re);
                if (m) return m[1];
            }
            return null;
        }

        async function handleFind() {
            reset();
            const parsed = parseInput(input.value);
            if (!parsed) {
                setError('Please enter a YouTube channel URL, handle (e.g. @channelname), or channel name.');
                return;
            }

            if (parsed.channelId) {
                showResult('https://www.youtube.com/feeds/videos.xml?channel_id=' + parsed.channelId);
                return;
            }

            // Need to fetch the page to extract the channel ID
            findBtn.disabled = true;
            setStatus('Looking up channel\u2026');
            try {
                const channelId = await resolveToChannelId(parsed.fetchUrl);
                setStatus('');
                if (channelId) {
                    showResult('https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId);
                } else {
                    setError('Could not find a channel ID on that page. Try using the full channel URL (youtube.com/channel/UC\u2026).');
                }
            } catch (err) {
                setStatus('');
                setError('Error: ' + err.message);
            } finally {
                findBtn.disabled = false;
            }
        }

        findBtn.addEventListener('click', handleFind);
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') handleFind();
        });

        copyBtn.addEventListener('click', function () {
            const url = rssLink.href;
            if (!url) return;
            navigator.clipboard.writeText(url).then(function () {
                copyBtn.textContent = 'Copied!';
                setTimeout(function () { copyBtn.textContent = 'Copy'; }, 2000);
            }).catch(function () {
                // Fallback for older browsers
                const ta = document.createElement('textarea');
                ta.value = url;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                copyBtn.textContent = 'Copied!';
                setTimeout(function () { copyBtn.textContent = 'Copy'; }, 2000);
            });
        });
    }());
</script>

{% include footer.html %}
