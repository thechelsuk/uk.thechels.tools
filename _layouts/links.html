{% include header.html %}
<h1 class="post-title">{{ page.title }}</h1>
{% assign posts = site.bookmarks %}
<p class="marker"><b>{{ posts | size }}</b> total posts.</p>

<div id="blog-archives" class="flow">

  {% for post in posts %}
  <div class="posts">
    <a href="{{ post.url }}">{{ post.title }}</a>
    <span></span>
    <span class="meta">// {{post.i_type}}, {{ post.content | number_of_words }} words on {{ post.date | date: "%-d %B %Y" }}.</span>
  </div>
  {% endfor %}

</div>
{% include footer.html %}
