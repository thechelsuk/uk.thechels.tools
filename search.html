<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Film Search</title>
        <link rel="apple-touch-icon"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23222'/%3E%3Cpath d='M30 25h40a5 5 0 0 1 5 5v40a5 5 0 0 1-5 5H30a5 5 0 0 1-5-5V30a5 5 0 0 1 5-5zm0 0v50m40-50v50M30 35h40M30 45h40M30 55h40M30 65h40' stroke='%23fff' stroke-width='4' fill='none'/%3E%3C/svg%3E">
        <style>
            html {
                box-sizing: border-box;
            }

            *,
            *:before,
            *:after {
                box-sizing: inherit;
            }

            body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
                background: #181818;
                color: #f3f3f3;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                padding: 0 0 60px 0;
            }

            @media (prefers-color-scheme: light) {
                body {
                    background: #f3f3f3;
                    color: #181818;
                }

                .search-box {
                    background: #fff;
                    color: #181818;
                }

                .result,
                .matches {
                    background: #f9f9f9;
                }
            }

            h1 {
                font-size: 2.2rem;
                margin: 2.2em 0 0.3em 0;
                letter-spacing: -1px;
                font-weight: 700;
                text-align: center;
                color: #f3f3f3;
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.13);
            }

            .supporting {
                font-size: 1.13rem;
                margin-bottom: 2em;
                color: #bdbdbd;
                max-width: 420px;
                text-align: center;
                line-height: 1.5;
            }

            .supporting .faint {
                color: #888;
                font-size: 0.98em;
            }

            .search-box {
                width: 92vw;
                max-width: 420px;
                font-size: 1.25rem;
                padding: 1em 1.2em;
                border-radius: 1.5em;
                border: 2px solid #2e7ad3;
                margin-bottom: 1.2em;
                background: #232323;
                color: #f3f3f3;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.10);
                outline: none;
                transition: box-shadow 0.2s, border 0.2s;
            }

            .search-box:focus {
                box-shadow: 0 4px 18px rgba(46, 122, 211, 0.13);
                border: 2px solid #2e7ad3;
            }

            .actions {
                display: flex;
                gap: 0.7em;
                margin-bottom: 1.3em;
                flex-wrap: wrap;
                justify-content: center;
            }

            .actions button,
            .actions label {
                font-size: 1.08rem;
                padding: 0.6em 1.4em;
                border-radius: 1.2em;
                border: none;
                background: linear-gradient(90deg, #2e7ad3 60%, #232323 100%);
                color: #fff;
                cursor: pointer;
                margin: 0.2em 0;
                transition: background 0.2s, box-shadow 0.2s;
                box-shadow: 0 1px 4px rgba(46, 122, 211, 0.08);
                display: flex;
                align-items: center;
                gap: 0.5em;
                border: 1.5px solid #2e7ad3;
            }

            .actions button:hover,
            .actions label:hover {
                background: linear-gradient(90deg, #388be0 60%, #232323 100%);
                box-shadow: 0 2px 8px rgba(46, 122, 211, 0.13);
            }

            .actions input[type="file"] {
                display: none;
            }

            .result {
                font-size: 1.18rem;
                margin-bottom: 1em;
                padding: 0.7em 1em;
                border-radius: 1em;
                background: #232323;
                min-height: 2.2em;
                text-align: center;
                max-width: 420px;
                box-shadow: 0 1px 4px rgba(46, 122, 211, 0.07);
            }

            .matches {
                width: 92vw;
                max-width: 420px;
                background: #232323;
                border-radius: 1em;
                padding: 0.7em 0.5em 0.7em 0.5em;
                margin-bottom: 1.5em;
                min-height: 3em;
                box-shadow: 0 1px 4px rgba(46, 122, 211, 0.07);
            }

            .match-item {
                display: flex;
                flex-direction: column;
                gap: 0.1em;
                padding: 0.5em 0.2em;
                border-bottom: 1px solid #333;
            }

            .match-item:last-child {
                border-bottom: none;
            }

            .match-title {
                font-size: 1.08em;
                font-weight: 500;
                margin-bottom: 0.1em;
                letter-spacing: -0.5px;
            }

            .match-meta {
                font-size: 0.98em;
                color: #aaa;
                display: flex;
                gap: 1.2em;
                flex-wrap: wrap;
            }

            .footer {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100vw;
                background: rgba(24, 24, 24, 0.95);
                color: #888;
                font-size: 0.98em;
                text-align: center;
                padding: 0.7em 0.5em 0.7em 0.5em;
                z-index: 10;
                border-top: 1px solid #222;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 1.5em;
            }

            .footer button {
                font-size: 0.95em;
                padding: 0.3em 1em;
                border-radius: 1em;
                border: none;
                background: #333;
                color: #f3f3f3;
                cursor: pointer;
                margin-left: 0.5em;
            }

            .footer button:hover {
                background: #444;
            }

            @media (max-width: 500px) {
                h1 {
                    font-size: 1.3rem;
                }

                .supporting {
                    font-size: 1rem;
                }

                .search-box {
                    font-size: 1.05rem;
                }

                .result,
                .matches {
                    font-size: 1rem;
                }
            }
        </style>
    </head>

    <body>
        <h1>Film Search</h1>
        <div class="supporting">Quick Film Catalogue Search<br><span class="faint">Check if you have seen it
                before.</span>
        </div>
        <input type="text" class="search-box" id="searchBox" placeholder="Search for a film title…" autocomplete="off"
            autocapitalize="off" spellcheck="false">
        <div class="actions">
            <label for="yamlUpload" class="upload-label">
                <span>📂 Upload YAML</span>
                <input type="file" id="yamlUpload" accept=".yaml,.yml">
            </label>
            <button id="clearBtn" type="button">Clear</button>
        </div>
        <div class="result" id="result"></div>
        <div class="matches" id="matches"></div>
        <div class="footer">
            <span id="filmCount">0 films indexed</span>
            <button id="clearAllBtn" type="button">Clear all data</button>
        </div>
        <script>
            // --- Minimal YAML parser for the expected format ---
            function parseYAML(yaml) {
                // More robust: tolerate blank lines, extra spaces, and handle edge cases
                const lines = yaml.split(/\r?\n/);
                const films = [];
                let current = null;
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue; // skip blank lines
                    if (/^- /.test(line)) {
                        if (current) films.push(current);
                        current = {};
                        line = line.replace(/^- /, '');
                    }
                    if (!current) continue;
                    // Accept keys with or without quotes, tolerate extra spaces
                    const m = line.match(/^([A-Za-z0-9_]+):\s*['"]?(.+?)['"]?$/);
                    if (m) {
                        current[m[1].trim()] = m[2].trim();
                    }
                }
                if (current) films.push(current);
                // Debug: show how many records were parsed and how many have Title
                // alert(`Parsed ${films.length} records, ${films.filter(f => f.Title).length} with Title`);
                return films.filter(f => f.Title && f.Title.trim());
            }

            // --- Fuzzy search (Levenshtein distance) ---
            function levenshtein(a, b) {
                if (!a) return b.length;
                if (!b) return a.length;
                a = a.toLowerCase();
                b = b.toLowerCase();
                const matrix = Array.from({ length: a.length + 1 }, () => []);
                for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
                for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
                for (let i = 1; i <= a.length; i++) {
                    for (let j = 1; j <= b.length; j++) {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
                        );
                    }
                }
                return matrix[a.length][b.length];
            }

            // --- Local Storage helpers ---
            const LS_KEY = 'filmList';
            function loadFilms() {
                try {
                    const raw = localStorage.getItem(LS_KEY);
                    if (!raw) return [];
                    return JSON.parse(raw);
                } catch { return []; }
            }
            function saveFilms(films) {
                localStorage.setItem(LS_KEY, JSON.stringify(films));
            }
            function mergeFilms(existing, incoming) {
                const map = {};
                for (const f of existing) {
                    if (f.Imdb) map[f.Imdb.toUpperCase()] = f;
                }
                for (const f of incoming) {
                    if (f.Imdb) map[f.Imdb.toUpperCase()] = f;
                }
                return Object.values(map);
            }

            // --- UI and Search Logic ---
            let films = loadFilms();
            updateFilmCount();

            const searchBox = document.getElementById('searchBox');
            const resultDiv = document.getElementById('result');
            const matchesDiv = document.getElementById('matches');
            const yamlUpload = document.getElementById('yamlUpload');
            const clearBtn = document.getElementById('clearBtn');
            const clearAllBtn = document.getElementById('clearAllBtn');

            function updateFilmCount() {
                document.getElementById('filmCount').textContent = `${films.length} film${films.length === 1 ? '' : 's'} indexed`;
            }

            function showResult(text) {
                resultDiv.textContent = text;
            }

            // Helper to decode Unicode escape sequences (e.g., \u2013)
            function decodeUnicodeEscapes(str) {
                if (typeof str !== 'string') return str;
                return str.replace(/\\u([0-9a-fA-F]{4})/g, function (m, g1) {
                    return String.fromCharCode(parseInt(g1, 16));
                });
            }

            function showMatches(matches) {
                matchesDiv.innerHTML = '';
                for (const m of matches) {
                    const div = document.createElement('div');
                    div.className = 'match-item';
                    const title = document.createElement('span');
                    title.className = 'match-title';
                    title.textContent = decodeUnicodeEscapes(m.Title);
                    const meta = document.createElement('span');
                    meta.className = 'match-meta';
                    meta.innerHTML =
                        `<span>${decodeUnicodeEscapes(m.Year || '')}</span>` +
                        `<span>IMDB: ${decodeUnicodeEscapes(m.Imdb || '')}</span>` +
                        `<span>Rating: ${decodeUnicodeEscapes(m.Rating || '')}</span>`;
                    div.appendChild(title);
                    div.appendChild(meta);
                    matchesDiv.appendChild(div);
                }
            }

            function doSearch() {
                const q = searchBox.value.trim();
                if (!q) {
                    showResult('');
                    showMatches([]);
                    return;
                }
                // Exact match (case-insensitive)
                const found = films.find(f => f.Title && f.Title.toLowerCase() === q.toLowerCase());
                if (found) {
                    showResult('Yes, already seen');
                } else {
                    showResult('No, not seen');
                }
                // Fuzzy: sort by Levenshtein distance, then alphabetically
                const scored = films.map(f => ({
                    ...f,
                    _score: levenshtein(q, f.Title || '')
                }));
                scored.sort((a, b) => a._score - b._score || (a.Title || '').localeCompare(b.Title || ''));
                showMatches(scored.slice(0, 10));
            }

            searchBox.addEventListener('input', doSearch);
            clearBtn.addEventListener('click', () => {
                searchBox.value = '';
                showResult('');
                showMatches([]);
                searchBox.focus();
            });
            yamlUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function (evt) {
                    try {
                        const parsed = parseYAML(evt.target.result);
                        const withImdb = parsed.filter(f => f.Imdb && f.Imdb.trim());
                        const uniqueImdb = new Set(withImdb.map(f => f.Imdb.trim().toUpperCase()));
                        films = mergeFilms(films, parsed);
                        saveFilms(films);
                        updateFilmCount();
                        doSearch();
                        alert(
                            `Parsed ${parsed.length} records from YAML.\n` +
                            `${withImdb.length} records with Imdb code.\n` +
                            `${uniqueImdb.size} unique Imdb codes.\n` +
                            `Now ${films.length} indexed.`
                        );
                    } catch (err) {
                        alert('Could not parse YAML. Please check the file format.');
                    }
                };
                reader.readAsText(file);
                yamlUpload.value = '';
            });
            clearAllBtn.addEventListener('click', () => {
                if (confirm('Clear all indexed films? This cannot be undone.')) {
                    films = [];
                    saveFilms(films);
                    updateFilmCount();
                    showResult('');
                    showMatches([]);
                    searchBox.value = '';
                }
            });

            // Autofocus search box on load
            window.addEventListener('DOMContentLoaded', () => {
                searchBox.focus();
                doSearch();
            });
        </script>
    </body>

</html>
